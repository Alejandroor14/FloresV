<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Corazón de flores amarillas</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #faf3e6;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 20px;
  }

  button {
    margin-bottom: 20px;
    padding: 10px 20px;
    font-size: 1rem;
    background: #ffbb00;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }

  .tree-trunk {
    width: 30px;
    height: 80px;
    background: #7d4a1a;
    margin: 0 auto;
  }

  .heart-shape {
    position: relative;
    width: 250px;
    height: 220px;
    margin-bottom: 20px;
  }

  .flower {
    position: absolute;
    width: 15px;
    height: 15px;
    background: radial-gradient(circle at center, #ffec47 40%, #9b6f2a 90%);
    border-radius: 50%;
    opacity: 0;
    transform: scale(0.3);
    transition: opacity 0.4s ease, transform 0.5s ease;
    box-shadow: 0 0 4px 1px #f9da5a;
  }

  .flower::before {
    content: "";
    position: absolute;
    top: 5px;
    left: 5px;
    width: 5px;
    height: 5px;
    background: #7a4809;
    border-radius: 50%;
  }

  .flower.show {
    opacity: 1;
    transform: scale(1);
  }

  /* posición en forma de corazón aproximado */
  /* Las posiciones se definen en porcentaje respecto al contenedor corazón */
</style>
</head>
<body>

<button id="startAnim">Iniciar Animación</button>

<div class="heart-shape" aria-label="Corazón formado por flores amarillas">

  <div class="tree-trunk"></div>

  <!-- Aquí se generarán flores vía JS -->

</div>

<script>
  const heartShape = document.querySelector('.heart-shape');
  const startBtn = document.getElementById('startAnim');

  // Coordenadas aproximadas para posicionar las flores en la forma de corazón
  const flowerPositions = [
    {x: 50, y: 10}, {x: 42, y: 20}, {x: 58, y: 20},
    {x: 35, y: 35}, {x: 65, y: 35},
    {x: 27, y: 50}, {x: 73, y: 50},
    {x: 20, y: 70}, {x: 80, y: 70},
    {x: 32, y: 85}, {x: 68, y: 85},
    {x: 43, y: 90}, {x: 57, y: 90},
    {x: 50, y: 75}, {x: 50, y: 50},
    // Puedes agregar más para más densidad
  ];

  // Crear flores y posicionarlas ocultas
  flowerPositions.forEach(pos => {
    const flower = document.createElement('div');
    flower.classList.add('flower');
    flower.style.left = pos.x + '%';
    flower.style.top = pos.y + '%';
    heartShape.appendChild(flower);
  });

  // Animar flores con retraso en la aparición
  function animateFlowers() {
    const flowers = document.querySelectorAll('.flower');
    flowers.forEach((f, i) => {
      setTimeout(() => {
        f.classList.add('show');
      }, i * 150);
    });
  }

  // Al hacer click en el botón, iniciar animación
  startBtn.addEventListener('click', () => {
    // Remover clase para reiniciar animación si se quiere repetir
    document.querySelectorAll('.flower').forEach(fl => fl.classList.remove('show'));
    setTimeout(animateFlowers, 100);
  });

</script>

</body>
</html>
